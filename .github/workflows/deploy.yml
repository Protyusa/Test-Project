name: Manual CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t test-project .

      - name: Show Docker Images
        run: docker images
